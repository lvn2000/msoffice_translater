# doc-translator configuration
# ──────────────────────────────
#
# The API key is read from the environment variable named below.
#   export API_KEY="sk-..."
# For Ollama (local), any dummy value works:
#   export API_KEY="ollama"

# Provider: "openai" (OpenAI-compatible APIs), "gemini", "claude"
provider = "openai"

llm {
  # Name of the environment variable that holds the API key
  api-key-env = "DEEPSEEK_API_KEY"

  # API endpoint URL
  api-url = "https://api.deepseek.com/v1/chat/completions"

  # Model name
  model   = "deepseek-chat"
}

# ── Quick examples (for reference) ───────────────────────────────────────────
#
# Ollama (local, no real API key needed):
#   export API_KEY="ollama"
#   provider = "openai"
#   llm {
#     api-key-env = "API_KEY"
#     api-url     = "http://localhost:11434/v1/chat/completions"
#     model       = "llama3.2"
#   }
#
# DeepSeek:
#   export DEEPSEEK_API_KEY="sk-deepseek-key"
#   provider = "openai"
#   llm {
#     api-key-env = "DEEPSEEK_API_KEY"
#     api-url     = "https://api.deepseek.com/v1/chat/completions"
#     model       = "deepseek-chat"
#   }
#
# OpenAI / ChatGPT:
#   export OPENAI_API_KEY="sk-openai-key"
#   provider = "openai"
#   llm {
#     api-key-env = "OPENAI_API_KEY"
#     api-url     = "https://api.openai.com/v1/chat/completions"
#     model       = "gpt-4o"
#   }
#
# Google Gemini:
#   export GEMINI_API_KEY="gemini-key"
#   provider = "gemini"
#   llm {
#     api-key-env = "GEMINI_API_KEY"
#     model       = "gemini-2.0-flash"
#   }
#
# Anthropic Claude:
#   export ANTHROPIC_API_KEY="sk-ant-key"
#   provider = "claude"
#   llm {
#     api-key-env = "ANTHROPIC_API_KEY"
#     model       = "claude-sonnet-4-20250514"
#   }
# ──────────────────────────────────────────────────────────────────────────────

app {
  # Directory with source files (relative to project root or absolute path)
  source-dir     = "src/main/resources/source"

  # Directory for translated files
  output-dir     = "src/main/resources/output"

  # Texts per API call (reduce if you hit token limits)
  max-batch-size = 5

  # Source language. "auto" for automatic detection.
  # Examples: "Ukrainian", "English", "German", "auto"
  source-lang = "auto"

  # Target language for translation.
  # Examples: "Russian", "Ukrainian", "English"
  target-lang = "Russian"

  # Short language code used as output filename suffix (e.g. "_ru", "_uk", "_en").
  # Also used to set document language metadata in Office files.
  lang-code = "ru"
}
