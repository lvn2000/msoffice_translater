# pptx-translator configuration
# ─────────────────────────────
# Values here override environment variables.
# Do NOT commit this file to version control with a real API key!
#
# Option A: set the key here (recommended)
# deepseek.api-key = "sk-..."
#
# Option B: set via DEEPSEEK_API_KEY env var (used if the line above is commented out)

deepseek {
  # api-key = "sk-..."
  api-url = "https://api.deepseek.com/v1/chat/completions"
  model   = "deepseek-chat"
}

app {
  # Directory with source .pptx files (relative to project root)
  source-dir     = "src/main/resources/source"

  # Directory for translated .pptx files
  output-dir     = "src/main/resources/output"

  # Texts per API call (reduce if you hit token limits)
  max-batch-size = 10

  # Source language. Use "auto" (or leave empty) for automatic detection.
  # Examples: "Ukrainian", "English", "German", "auto"
  source-lang = "auto"

  # Target language for translation.
  # Examples: "Russian", "Ukrainian", "English"
  target-lang = "Russian"
}
